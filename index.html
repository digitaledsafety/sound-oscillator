<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">
    <base target="_top">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sound Oscillator PWA</title>
    <link rel="manifest" href="manifest.json">
    <script src="https://unpkg.com/tone"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <style>
      /* Custom styles to ensure full height and centering */
      html, body {
        height: 100%;
        margin: 0;
        font-family: 'Inter', sans-serif;
        background-color: #2c3e50;
        overflow: hidden; /* Prevent scrolling */
        touch-action: none; /* Disable default touch actions for better multi-touch handling */
      }

      /* Full-screen SVG for visualization */
      #waveformSvg {
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        background-color: #2c3e50;
        z-index: 1;
      }

      /* Settings Modal */
      #settingsModal {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background-color: rgba(0, 0, 0, 0.7);
        display: none; /* Hidden by default */
        justify-content: center;
        align-items: center;
        z-index: 100;
        backdrop-filter: blur(4px);
      }

      #modalContent {
        background-color: white;
        padding: 2rem;
        border-radius: 1rem;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5);
        width: 90%;
        max-width: 400px;
        position: relative;
      }

      #closeSettingsBtn {
        position: absolute;
        top: 0.75rem;
        right: 0.75rem;
        font-size: 1.5rem;
        line-height: 1;
        cursor: pointer;
        color: #666;
      }

      #closeSettingsBtn:hover {
        color: #000;
      }

      select {
        width: 100%;
        padding: 0.5rem;
        border-radius: 0.5rem;
        border: 1px solid #ccc;
        margin-bottom: 1rem;
        background-color: #f9f9f9;
      }

      .modal-label {
        display: block;
        font-size: 0.875rem;
        font-weight: 600;
        color: #4a5568;
        margin-bottom: 0.25rem;
      }
    </style>
  </head>
  <body>
    <svg id="waveformSvg"></svg>

    <!-- Top-Left UI Controls -->
    <div id="top-left-controls" class="fixed top-4 left-4 z-50 flex flex-col gap-2">
      <button id="openSettingsBtn" class="bg-white/20 hover:bg-white/30 backdrop-blur-md text-white p-2 rounded-full shadow-lg transition-all border border-white/30" title="Settings">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"></path><circle cx="12" cy="12" r="3"></circle></svg>
      </button>
    </div>

    <div id="settingsModal">
      <div id="modalContent">
        <span id="closeSettingsBtn">&times;</span>
        <h2 class="text-xl font-bold mb-4 border-b pb-2">Settings</h2>

        <div class="mb-4">
          <label for="scaleSelect" class="modal-label">Musical Scale</label>
          <select id="scaleSelect" title="Select Musical Scale" aria-label="Select Musical Scale"></select>
        </div>

        <div class="mb-4">
          <label for="waveformSelect" class="modal-label">Waveform</label>
          <select id="waveformSelect" title="Select Waveform" aria-label="Select Waveform">
            <option value="sine">Sine</option>
            <option value="square">Square</option>
            <option value="triangle">Triangle</option>
            <option value="sawtooth">Sawtooth</option>
          </select>
        </div>

        <div class="mb-4">
          <label for="volumeSlider" class="modal-label">Master Volume</label>
          <input type="range" id="volumeSlider" min="0" max="1" step="0.01" value="0.8" class="w-full h-2 bg-gray-200 rounded-lg appearance-none cursor-pointer accent-blue-600">
        </div>

        <div class="mb-6">
          <button id="clearAllBtn" class="w-full bg-red-500 hover:bg-red-600 text-white font-bold py-2 px-4 rounded transition-colors uppercase tracking-wider text-sm">
            Clear All Sounds
          </button>
        </div>

        <div id="frequencyDisplay" class="text-center text-sm text-gray-500 font-mono">0.00 Hz</div>

        <div class="mt-4 text-center">
            <span id="betaDisplay" class="bg-yellow-400 text-black text-[10px] font-bold px-2 py-0.5 rounded-full uppercase tracking-tighter">Beta: 0.0°</span>
        </div>
      </div>
    </div>

    <script src="js/main.js"></script>
  </body>
</html>
