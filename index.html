<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">
    <base target="_top">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sound Oscillator PWA</title>
    <link rel="manifest" href="manifest.json">
    <script src="https://unpkg.com/tone"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <style>
      /* Custom styles to ensure full height and centering */
      html, body {
        height: 100%;
        margin: 0;
        font-family: 'Inter', sans-serif;
        background-color: #2c3e50;
        overflow: hidden; /* Prevent scrolling */
        touch-action: none; /* Disable default touch actions for better multi-touch handling */
      }

      /* Full-screen SVG for visualization */
      #waveformSvg {
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        background-color: #2c3e50;
        z-index: 1;
      }

      /* Settings Modal */
      #settingsModal {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background-color: rgba(0, 0, 0, 0.7);
        display: none; /* Hidden by default */
        justify-content: center;
        align-items: center;
        z-index: 100;
        backdrop-filter: blur(4px);
      }

      #modalContent {
        background-color: white;
        padding: 2rem;
        border-radius: 1rem;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5);
        width: 90%;
        max-width: 400px;
        position: relative;
      }

      #closeSettingsBtn {
        position: absolute;
        top: 0.75rem;
        right: 0.75rem;
        font-size: 1.5rem;
        line-height: 1;
        cursor: pointer;
        color: #666;
      }

      #closeSettingsBtn:hover {
        color: #000;
      }

      select {
        width: 100%;
        padding: 0.5rem;
        border-radius: 0.5rem;
        border: 1px solid #ccc;
        margin-bottom: 1rem;
        background-color: #f9f9f9;
      }

      .modal-label {
        display: block;
        font-size: 0.875rem;
        font-weight: 600;
        color: #4a5568;
        margin-bottom: 0.25rem;
      }
    </style>
  </head>
  <body>
    <svg id="waveformSvg"></svg>

    <!-- UI Overlay for persistent info and settings -->
    <div id="uiOverlay" class="fixed top-0 left-0 w-full p-4 pointer-events-none z-10 flex justify-between items-start">
      <div id="infoOverlay" class="bg-black/30 backdrop-blur-md rounded-lg px-4 py-2 text-white font-mono text-sm shadow-lg">
        <div id="frequencyDisplay">0.00 Hz (C0)</div>
        <div id="betaDisplay" class="text-xs text-yellow-400">Beta: 0.0°</div>
      </div>

      <button id="openSettingsBtn" class="pointer-events-auto bg-white/10 hover:bg-white/20 backdrop-blur-md p-2 rounded-full transition-colors shadow-lg" title="Settings" aria-label="Open Settings">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z" />
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="15 12a3 3 0 11-6 0 3 3 0 016 0z" />
        </svg>
      </button>
    </div>


    <div id="settingsModal">
      <div id="modalContent">
        <span id="closeSettingsBtn">&times;</span>
        <h2 class="text-xl font-bold mb-4 border-b pb-2">Settings</h2>

        <div class="mb-4">
          <label for="scaleSelect" class="modal-label">Musical Scale</label>
          <select id="scaleSelect" title="Select Musical Scale" aria-label="Select Musical Scale"></select>
        </div>

        <div class="mb-4">
          <label for="waveformSelect" class="modal-label">Waveform</label>
          <select id="waveformSelect" title="Select Waveform" aria-label="Select Waveform">
            <option value="sine">Sine</option>
            <option value="square">Square</option>
            <option value="triangle">Triangle</option>
            <option value="sawtooth">Sawtooth</option>
          </select>
        </div>

        <div class="mb-4">
          <label for="volumeSlider" class="modal-label">Master Volume</label>
          <input type="range" id="volumeSlider" min="0" max="1" step="0.01" value="0.8" class="w-full h-2 bg-gray-200 rounded-lg appearance-none cursor-pointer accent-blue-600">
        </div>

        <div class="mb-4">
          <label for="delaySlider" class="modal-label">Delay (Echo)</label>
          <input type="range" id="delaySlider" min="0" max="1" step="0.01" value="0.3" class="w-full h-2 bg-gray-200 rounded-lg appearance-none cursor-pointer accent-blue-600">
        </div>

        <div class="mb-6">
          <button id="clearAllBtn" class="w-full bg-red-500 hover:bg-red-600 text-white font-bold py-2 px-4 rounded transition-colors uppercase tracking-wider text-sm">
            Clear All Sounds
          </button>
        </div>

      </div>
    </div>

    <script src="js/main.js"></script>
  </body>
</html>
